<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REXPN Exam Prep — Flashcards</title>
  <style>
    :root {
      --blue:   #1B3A6B;
      --teal:   #0A7E8C;
      --ltblue: #E8F4F8;
      --white:  #FFFFFF;
      --text:   #1A1A1A;
      --muted:  #666;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, var(--blue) 0%, var(--teal) 100%);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 1rem 1rem;
      gap: 0.75rem;
      overflow-x: hidden;
    }
    header { text-align: center; color: #fff; flex-shrink: 0; }
    header .brand { font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; opacity: 0.8; text-transform: uppercase; }
    header h1 { font-size: 1.3rem; font-weight: 800; margin-top: 0.2rem; }
    header .subtitle { font-size: 0.8rem; opacity: 0.75; margin-top: 0.15rem; }
    #progress-info {
      display: flex; align-items: center; gap: 0.75rem;
      color: rgba(255,255,255,0.85); font-size: 0.8rem;
      flex-shrink: 0; width: 100%; max-width: 640px;
    }
    #progress-bar-track {
      flex: 1; background: rgba(255,255,255,0.25);
      border-radius: 4px; height: 5px;
    }
    #progress-bar-fill { height: 100%; background: #fff; border-radius: 4px; transition: width 0.3s; }
    .card-scene {
      width: 100%; max-width: 640px;
      perspective: 1200px;
      cursor: pointer;
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
    }
    .card-inner {
      position: relative; width: 100%;
      flex: 1; min-height: 0;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1);
      transform-style: preserve-3d;
    }
    .card-scene.flipped .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0;
      backface-visibility: hidden; -webkit-backface-visibility: hidden;
      border-radius: var(--radius);
      display: flex; flex-direction: column;
      padding: 1.5rem 1.75rem;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    .card-front { background: var(--white); align-items: center; justify-content: center; }
    .card-back  { background: var(--ltblue); transform: rotateY(180deg); }
    .card-badge {
      font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em;
      background: var(--ltblue); color: var(--teal);
      padding: 0.2rem 0.65rem; border-radius: 20px;
      margin-bottom: 0.85rem; flex-shrink: 0;
    }
    .card-back .card-badge { background: rgba(10,126,140,0.12); }
    .card-front .q-text {
      font-size: 1.1rem; font-weight: 600; color: var(--blue); line-height: 1.55;
      text-align: center; overflow-y: auto; flex: 1;
      display: flex; align-items: center; justify-content: center;
      scrollbar-width: thin; scrollbar-color: rgba(27,58,107,0.3) transparent;
    }
    .card-back .a-label { font-size: 0.7rem; font-weight: 700; color: var(--teal); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; flex-shrink: 0; }
    .card-back .a-text  {
      font-size: 0.975rem; color: var(--text); line-height: 1.65;
      overflow-y: auto; flex: 1; min-height: 0; padding-right: 4px;
      scrollbar-width: thin; scrollbar-color: rgba(10,126,140,0.4) transparent;
    }
    .card-back .a-text::-webkit-scrollbar { width: 4px; }
    .card-back .a-text::-webkit-scrollbar-track { background: transparent; }
    .card-back .a-text::-webkit-scrollbar-thumb { background: rgba(10,126,140,0.4); border-radius: 4px; }
    .tap-hint { flex-shrink: 0; margin-top: 0.6rem; font-size: 0.7rem; color: var(--muted); text-align: center; }
    .card-back .tap-hint { color: var(--teal); opacity: 0.7; }
    .controls {
      display: flex; gap: 0.65rem; flex-wrap: nowrap;
      justify-content: center; flex-shrink: 0;
      width: 100%; max-width: 640px;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    .btn {
      padding: 0.6rem 1.2rem; border-radius: 50px;
      border: 2px solid rgba(255,255,255,0.4);
      background: rgba(255,255,255,0.15); color: #fff;
      font-weight: 700; font-size: 0.875rem; cursor: pointer;
      transition: all 0.2s; backdrop-filter: blur(4px);
      white-space: nowrap; flex: 1; max-width: 160px;
    }
    .btn:hover { background: rgba(255,255,255,0.3); border-color: rgba(255,255,255,0.7); }
    .btn:active { transform: scale(0.96); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn.btn-primary { background: rgba(255,255,255,0.9); color: var(--blue); border-color: transparent; }
    .btn.btn-primary:hover { background: #fff; }
    #loading { color: rgba(255,255,255,0.8); font-size: 1rem; text-align: center; padding: 3rem; flex: 1; }
    @media (min-width: 768px) {
      body { padding: 1.75rem 1.5rem 1.5rem; gap: 1rem; }
      header h1 { font-size: 1.6rem; }
      .card-face { padding: 2rem 2.5rem; }
      .card-front .q-text { font-size: 1.2rem; }
      .card-back .a-text { font-size: 1.05rem; }
      .btn { font-size: 0.95rem; padding: 0.65rem 1.4rem; }
    }
    @media (max-width: 380px) {
      body { padding: 0.75rem; gap: 0.5rem; }
      header .brand { font-size: 0.65rem; }
      header h1 { font-size: 1.1rem; }
      header .subtitle { display: none; }
      .card-face { padding: 1rem 1.1rem; }
      .card-front .q-text { font-size: 0.975rem; }
      .card-back .a-text { font-size: 0.875rem; }
      .btn { font-size: 0.8rem; padding: 0.5rem 0.75rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="brand">Uprising Test Prep</div>
  <h1>REXPN Exam Prep</h1>
  <div class="subtitle">500 Digital Flashcards</div>
</header>
<div id="progress-info">
  <span id="card-counter">Card 1 of 500</span>
  <div id="progress-bar-track"><div id="progress-bar-fill" style="width:0%"></div></div>
  <span id="domain-label"></span>
</div>
<div id="loading">Loading flashcards...</div>
<div class="card-scene" id="card-scene" style="display:none" onclick="flipCard()">
  <div class="card-inner" id="card-inner">
    <div class="card-face card-front">
      <div class="card-badge" id="front-badge"></div>
      <div class="q-text" id="q-text"></div>
      <div class="tap-hint">Tap to reveal answer</div>
    </div>
    <div class="card-face card-back">
      <div class="card-badge" id="back-badge">Answer</div>
      <div class="a-label">Answer</div>
      <div class="a-text" id="a-text"></div>
      <div class="tap-hint">Tap to flip back</div>
    </div>
  </div>
</div>
<div class="controls" id="controls" style="display:none">
  <button class="btn" id="prev-btn" onclick="event.stopPropagation();move(-1)" disabled>&#8592; Prev</button>
  <button class="btn btn-primary" onclick="event.stopPropagation();shuffleCards()">&#10227; Shuffle</button>
  <button class="btn" id="next-btn" onclick="event.stopPropagation();move(1)">Next &#8594;</button>
</div>
<script>
const DOMAIN_LABELS = {
  management_of_care: "Management of Care",
  safety_and_infection_control: "Safety and Infection Control",
  health_promotion_and_maintenance: "Health Promotion and Maintenance",
  psychosocial_integrity: "Psychosocial Integrity",
  basic_care_and_comfort: "Basic Care and Comfort",
  pharmacological_and_parenteral_therapies: "Pharmacological and Parenteral Therapies",
  reduction_of_risk_potential: "Reduction of Risk Potential",
  physiological_adaptation: "Physiological Adaptation",
};
let cards   = [];
let current = 0;
async function init() {
  try {
    const res = await fetch('flashcards.json');
    if (!res.ok) throw new Error('Network error');
    cards = await res.json();
    document.getElementById('loading').style.display    = 'none';
    document.getElementById('card-scene').style.display = 'flex';
    document.getElementById('controls').style.display   = 'flex';
    show();
  } catch (e) {
    document.getElementById('loading').textContent = 'Error loading flashcards. Please try refreshing.';
  }
}
function domainLabel(key) {
  return DOMAIN_LABELS[key] || key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}
function show() {
  const c = cards[current];
  document.getElementById('card-scene').classList.remove('flipped');
  document.getElementById('a-text').scrollTop = 0;
  const label = domainLabel(c.domain || c.chapter || '');
  document.getElementById('q-text').textContent       = c.front;
  document.getElementById('a-text').textContent       = c.back;
  document.getElementById('front-badge').textContent  = label;
  document.getElementById('back-badge').textContent   = label;
  document.getElementById('card-counter').textContent = `Card ${current+1} of ${cards.length}`;
  document.getElementById('domain-label').textContent = label;
  document.getElementById('progress-bar-fill').style.width = `${((current+1)/cards.length*100).toFixed(1)}%`;
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === cards.length - 1;
}
function flipCard() { document.getElementById('card-scene').classList.toggle('flipped'); }
function move(dir) {
  const next = current + dir;
  if (next < 0 || next >= cards.length) return;
  current = next; show();
}
function shuffleCards() {
  for (let i = cards.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [cards[i], cards[j]] = [cards[j], cards[i]];
  }
  current = 0; show();
}
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') move(1);
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') move(-1);
  else if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); flipCard(); }
});
init();
</script>
</body>
</html>
